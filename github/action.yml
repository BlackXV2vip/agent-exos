name: "exos-agent GitHub Action"
description: "Run exos-agent in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the exos-agent session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of ExosAgent App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/exos-agent,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.exos-agent.ai"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get exos-agent version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/exos-agent/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache exos-agent
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.exos-agent/bin
        key: exos-agent-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install exos-agent
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://exos-agent.ai/install | bash

    - name: Add exos-agent to PATH
      shell: bash
      run: echo "$HOME/.exos-agent/bin" >> $GITHUB_PATH

    - name: Run exos-agent
      shell: bash
      id: run_exos-agent
      run: exos-agent github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
